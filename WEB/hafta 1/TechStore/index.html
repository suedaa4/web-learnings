<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    
  <main>
    
    <header>
        <h1>TECHSTORE</h1>
        <P>Premium Technology Products</P>
    </header>

    <section class="products">

        <div class="product-card">
            <h3>Laptop</h3>
            <p>Powerful Performance</p>
            <p><strong>$999</strong></p>
            <button>Buy Now</button>
        </div>

        <div class="product-card">
            <h3>Smart Phone</h3>
            <p>Amazing Camera</p>
            <p><strong>$799</strong></p>
            <button>Buy Now</button>
        </div>

        <div class="product-card">
            <h3>Smart Watch</h3>
            <p>Stay Connected</p>
            <p><strong>$199</strong></p>
            <button>Buy Now</button>
        </div>
    </section>

    <section>

        <form>

            <h2>Contact Us</h2>

            <label for="name">Name:</label>
            <input type="text" id="name" name="name">

            <label for="email">Email:</label>
            <input type="email" id="email" name="email">

            <label for="message">Message:</label>
            <textarea id="message" name="message">"Enter your message"</textarea>

            <button type="submit">Submit</button>

        </form>

    </section>

  </main>  

    <footer>
        <p>&copy; 2024 TechStore.</p>
    </footer>
</body>
</html>
