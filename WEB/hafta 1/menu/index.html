<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Cafe Aroma</title>
</head>

<body>

    <header>
        <h1> CAFE AROMA </h1>
        <p> World's Best Coffee </p>
    </header>

    <nav>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#menu">Menu</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <main>
        <section>
            <h2>Who are we?</h2>
            <p>Welcome to Cafe Aroma, where we serve the finest coffee in town!</p>
        </section>

        <section>
            <h2>Popular Products</h2>
            <ul>
                <li><a href="#Latte"> Latte </li>
                <li><a href="#Espresso"> Espresso </li>
                <li><a href="#Cappucino"> Cappucino </li>
                <li><a href="#Cookie"> Cookie </li>
                <li><a href="#Cheesecake"> Cheesecake </li>
            </ul>

        </section>

        <img src="kahve.jpg" alt="Coffee Image" >

        <section>
            <h2>Contact Us</h2>
            <form>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name"><br><br>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email"><br><br>

                <label for="message">Message:</label><br>
                <textarea id="message" name="message" rows="5" cols="30"></textarea><br><br>

                <button type="submit">Submit</button>
            </form>
        </section>

    </main>
    <footer>
        <p>&copy; 2026 Cafe Aroma</p>
        <p> All rights reserved.</p>
    </footer>

</body>

</html>
